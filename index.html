<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dashboard</h1>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="searchId" placeholder="Enter ID">
    <button id="searchBtn">Search</button>
</div>

<div id="searchResult"></div>

<!-- TABLE -->
<table id="dataTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Color</th>
            <th>Capacity</th>
            <th>CPU</th>
            <th>Description</th>
            <th>Screen Size</th>
            <th>Email</th>
            <th>Date</th>
            <th>Save</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button id="addRowBtn">Add Row</button>

<script src="script.js"></script>
</body>
</html>
